<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huit.AI — Launching Soon</title>
<meta name="description" content="Huit.AI — The mortgage intelligence platform. Launching 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#040D1A; --teal:#0E7C7B; --teal2:#17C4C3;
  --white:#F0F4F8; --muted:#607080;
  --border:rgba(14,124,123,0.22); --grid:rgba(23,196,195,0.04);
}
html,body{height:100%;}
body{background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:52px 52px;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 60% at 50% 0%,rgba(14,124,123,0.10) 0%,transparent 70%);}
@keyframes scan{0%{top:-4px}100%{top:100vh}}
.scanline{position:fixed;left:0;right:0;height:2px;z-index:1;
  background:linear-gradient(90deg,transparent,rgba(23,196,195,0.25),transparent);
  animation:scan 9s linear infinite;pointer-events:none;}
.wrap{position:relative;z-index:2;display:flex;flex-direction:column;
  align-items:center;gap:0;padding:2rem;width:100%;}
.logo{font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(1.6rem,4vw,2.2rem);letter-spacing:-0.03em;
  margin-bottom:3.5rem;color:var(--white);}
.logo span{color:var(--teal2);}
@keyframes glitch{
  0%,88%,100%{clip-path:none;transform:translate(0);}
  90%{clip-path:polygon(0 18%,100% 18%,100% 32%,0 32%);transform:translate(-4px);color:var(--teal2);}
  92%{clip-path:polygon(0 55%,100% 55%,100% 70%,0 70%);transform:translate(4px);}
  94%{clip-path:none;transform:translate(0);}}
.headline{font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(3rem,12vw,9rem);line-height:0.88;letter-spacing:-0.05em;
  text-align:center;margin-bottom:0.4rem;animation:glitch 7s ease-in-out infinite;}
.subhead{font-family:'JetBrains Mono',monospace;
  font-size:clamp(0.7rem,1.5vw,0.95rem);letter-spacing:0.3em;
  color:var(--teal2);text-transform:uppercase;text-align:center;margin-bottom:4rem;}
.countdown{display:flex;align-items:flex-start;
  gap:clamp(0.5rem,2vw,1.5rem);margin-bottom:5rem;}
.cd-block{display:flex;flex-direction:column;align-items:center;}
.cd-num{font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:clamp(2.8rem,8vw,6rem);line-height:1;color:var(--white);
  min-width:clamp(80px,14vw,140px);text-align:center;
  padding:0.4rem 0.6rem;border:1px solid var(--border);
  background:rgba(14,124,123,0.04);position:relative;}
.cd-num::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 65%,rgba(23,196,195,0.06));pointer-events:none;}
.cd-label{font-family:'JetBrains Mono',monospace;
  font-size:clamp(0.55rem,1vw,0.65rem);letter-spacing:0.2em;
  color:var(--muted);text-transform:uppercase;margin-top:0.5rem;}
.cd-sep{font-family:'JetBrains Mono',monospace;font-weight:700;
  font-size:clamp(2rem,6vw,4.5rem);color:var(--teal);line-height:1;
  padding-top:0.4rem;align-self:flex-start;}
.email-section{display:flex;flex-direction:column;align-items:center;
  gap:0;width:100%;max-width:680px;}
.email-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;
  letter-spacing:0.25em;color:var(--teal);text-transform:uppercase;
  margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem;width:100%;}
.email-label::before,.email-label::after{content:'';flex:1;height:1px;background:var(--border);}
.email-grid{display:grid;grid-template-columns:repeat(4,1fr);
  width:100%;border:1px solid var(--border);overflow:hidden;}
.email-cell{padding:0.9rem 1rem;border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);display:flex;flex-direction:column;
  gap:0.2rem;transition:background 0.18s;}
.email-cell:hover{background:rgba(14,124,123,0.07);}
.email-cell:nth-child(4n){border-right:none;}
.email-cell:nth-last-child(-n+4){border-bottom:none;}
.email-dept{font-family:'JetBrains Mono',monospace;font-size:0.58rem;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--teal2);}
.email-addr{font-family:'JetBrains Mono',monospace;
  font-size:clamp(0.62rem,1.1vw,0.75rem);color:var(--white);text-decoration:none;}
.email-addr:hover{color:var(--teal2);}
@media(max-width:560px){
  .email-grid{grid-template-columns:repeat(2,1fr);}
  .email-cell:nth-child(4n){border-right:1px solid var(--border);}
  .email-cell:nth-child(2n){border-right:none;}
  .email-cell:nth-last-child(-n+4){border-bottom:1px solid var(--border);}
  .email-cell:nth-last-child(-n+2){border-bottom:none;}
  .cd-sep{display:none;}}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap">
  <div class="logo">HUIT<span>.</span>AI</div>
  <div class="headline">LAUNCHING</div>
  <div class="subhead">Mortgage Intelligence Platform &nbsp;·&nbsp; 2026</div>
  <div class="countdown">
    <div class="cd-block"><div class="cd-num" id="cd-d">000</div><div class="cd-label">Days</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-block"><div class="cd-num" id="cd-h">00</div><div class="cd-label">Hours</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-block"><div class="cd-num" id="cd-m">00</div><div class="cd-label">Min</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-block"><div class="cd-num" id="cd-s">00</div><div class="cd-label">Sec</div></div>
  </div>
  <div class="email-section">
    <div class="email-label">Contact</div>
    <div class="email-grid">
      <div class="email-cell"><span class="email-dept">Compliance</span><a href="mailto:compliance@huit.ai" class="email-addr">compliance@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Legal</span><a href="mailto:legal@huit.ai" class="email-addr">legal@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Privacy</span><a href="mailto:privacy@huit.ai" class="email-addr">privacy@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Security</span><a href="mailto:security@huit.ai" class="email-addr">security@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Investors</span><a href="mailto:investors@huit.ai" class="email-addr">investors@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Support</span><a href="mailto:support@huit.ai" class="email-addr">support@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Press</span><a href="mailto:press@huit.ai" class="email-addr">press@huit.ai</a></div>
      <div class="email-cell"><span class="email-dept">Careers</span><a href="mailto:careers@huit.ai" class="email-addr">careers@huit.ai</a></div>
    </div>
  </div>
</div>
<script>
const LAUNCH=new Date('2026-09-01T00:00:00Z');
const pad=(n,w=2)=>String(n).padStart(w,'0');
function tick(){
  const diff=Math.max(0,LAUNCH-Date.now());
  document.getElementById('cd-d').textContent=pad(Math.floor(diff/86400000),3);
  document.getElementById('cd-h').textContent=pad(Math.floor(diff%86400000/3600000));
  document.getElementById('cd-m').textContent=pad(Math.floor(diff%3600000/60000));
  document.getElementById('cd-s').textContent=pad(Math.floor(diff%60000/1000));
}
tick();setInterval(tick,1000);
</script>
</body>
</html>
